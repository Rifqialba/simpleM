services:
  postgres:
    image: postgres:17-alpine
    container_name: simplem-postgres

    environment:
      POSTGRES_USER: simplem
      POSTGRES_PASSWORD: simplem_password
      POSTGRES_DB: simplem_db

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U simplem"]
      interval: 10s
      timeout: 5s
      retries: 5

    restart: unless-stopped

  redis:
    image: redis:8-alpine
    container_name: simplem-redis

    ports:
      - "6380:6379"

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

    restart: unless-stopped

volumes:
  postgres_data:
  redis_data: